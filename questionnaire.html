    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --bg: #080808; --surface: #111111; --surface2: #161616;
      --border: #222222; --gold: #C4973A; --gold-light: #E2B95A;

      pointer-events: none; z-index: 0; opacity: 0.35;
    }

    /* ─── LAYOUT ─── */
    .wrapper {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px; position: relative; z-index: 1;
    }
    .quiz-box {
      width: 100%; max-width: 640px;
    }

    /* ─── TOP BAR ─── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 40px;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px; font-weight: 400;
      color: var(--text); text-decoration: none;
    }
    .logo span { color: var(--gold); }
    .step-counter { font-size: 12px; color: var(--muted); }

    /* ─── PROGRESS ─── */
    .progress-bar {
      height: 2px; background: var(--dim);
      border-radius: 2px; margin-bottom: 52px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--gold);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    /* ─── QUESTION ─── */
    .question-block { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .q-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 14px; display: block;
    }
    .q-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 300; line-height: 1.15;
      margin-bottom: 36px;
    }
    .q-text em { font-style: italic; color: var(--gold); }

    /* ─── OPTIONS ─── */
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option {
      display: flex; align-items: flex-start; gap: 16px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .option:hover {
      border-color: rgba(196,151,58,0.4);
      background: rgba(196,151,58,0.04);
    }
    .option.selected {
      border-color: var(--gold);
      background: rgba(196,151,58,0.08);
    }
    .option-icon {
      font-size: 22px; flex-shrink: 0;
      width: 36px; text-align: center;
      margin-top: 1px;
    }
    .option-content {}
    .option-title {
      font-size: 15px; font-weight: 400;
      display: block; margin-bottom: 3px;
    }
    .option-sub {
      font-size: 12px; color: var(--muted);
    }

    /* ─── NAV BUTTONS ─── */
    .nav-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 32px;
    }
    .btn-back {
      background: none; border: none; color: var(--muted);
      font-size: 13px; cursor: pointer; padding: 8px 0;
      font-family: 'Outfit', sans-serif;
      transition: color 0.2s;
    }
    .btn-back:hover { color: var(--text); }
    .btn-next {
      background: var(--gold); color: #000;

      border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: 'Outfit', sans-serif;
      transition: all 0.2s; opacity: 0.3;
      pointer-events: none;
    }

    .btn-next.active:hover { background: var(--gold-light); transform: translateY(-1px); }

    /* ─── RÉSULTAT ─── */

    }
    .result-card .offer-features li::before { content: '→'; color: var(--gold); font-size: 11px; }

    .secondary-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 12px;

    .btn-full-outline {

    .restart-link {
      text-align: center; margin-top: 20px;
      font-size: 12px; color: var(--dim);
      cursor: pointer; transition: color 0.2s;
    }
    .restart-link:hover { color: var(--muted); }

    /* HIDDEN */

</head>

function render() {
  const q = questions[currentQ];
  const selected = answers[currentQ];
  const pct = ((currentQ + 1) / questions.length) * 100;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepCounter').textContent = `${currentQ + 1} / ${questions.length}`;

  const html = `
    <div class="question-block">
      <span class="q-label">${q.label}</span>
      <h2 class="q-text">${q.text}</h2>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="option ${selected === i ? 'selected' : ''}" onclick="selectOption(${i})">
            <span class="option-icon">${opt.icon}</span>
            <span class="option-content">
              <span class="option-title">${opt.title}</span>
              <span class="option-sub">${opt.sub}</span>
            </span>
          </button>
        `).join('')}
      </div>
      <div class="nav-row">
        <button class="btn-back" onclick="goBack()" ${currentQ === 0 ? 'style="visibility:hidden"' : ''}>← Précédent</button>
        <button class="btn-next ${selected !== undefined ? 'active' : ''}" id="btnNext" onclick="goNext()">
          ${currentQ === questions.length - 1 ? 'Voir mon résultat →' : 'Continuer →'}
        </button>
      </div>
    </div>
  `;
  document.getElementById('quizArea').innerHTML = html;
}

function selectOption(idx) {
  answers[currentQ] = idx;
  render();
}

function goNext() {
  if (answers[currentQ] === undefined) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    render();
  } else {

}

function goBack() {
  if (currentQ > 0) { currentQ--; render(); }
}

// ═══════════════════════════════════════════════
// CALCUL DU RÉSULTAT
// ═══════════════════════════════════════════════
function showResult() {
  // Reset scores
  scores = { A:0, B:0, C:0, D:0, E:0, F:0, G:0 };

  // Accumulate
  questions.forEach((q, qi) => {
    const sel = answers[qi];
    if (sel !== undefined) {
      const optScores = q.options[sel].scores;
      for (const [k, v] of Object.entries(optScores)) {
        scores[k] = (scores[k] || 0) + v;
      }
    }
  });

  // Sort
  const ranked = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const [topKey] = ranked[0];
  const secondaries = ranked.slice(1, 3).filter(([,v]) => v > 0).map(([k]) => k);

  const top = offers[topKey];
  const calendlyUrl = 'https://calendly.com/contact-yoanndesgrand/seance-decouverte-coaching-sportif';

  // Build secondaries HTML
  const secHTML = secondaries.map(k => {
    const o = offers[k];
    return `
      <div class="secondary-card">
        <div class="sec-title">${o.name}</div>
        <div class="sec-price">${o.price}</div>
        <div class="sec-why">${o.why.substring(0, 100)}...</div>
      </div>
    `;
  }).join('');

  const ctaLink = top.stripe ? top.link : calendlyUrl;
  const ctaTarget = '_blank';

  const html = `
    <div class="result-block">
      <div class="result-header">
        <span class="checkmark">✨</span>
        <h2>Voici <em>ton offre idéale</em></h2>
        <p>D'après tes réponses, voici ce qui correspond le mieux à ton profil et tes objectifs.</p>
      </div>

      <div class="result-card">
        <span class="primary-tag">⭐ Recommandé pour toi</span>
        <span class="offer-name">${top.name}</span>
        <span class="offer-price">${top.price}</span>
        <p class="offer-why">${top.why}</p>
        <ul class="offer-features">
          ${top.features.map(f => `<li>${f}</li>`).join('')}
        </ul>
      </div>

      ${secondaries.length > 0 ? `
        <p style="font-size:12px;color:var(--muted);margin:24px 0 12px;letter-spacing:0.05em;">AUTRES OPTIONS QUI POURRAIENT TE CONVENIR</p>
        ${secHTML}
      ` : ''}

      <div class="result-ctas">
        ${topKey === 'A'
          ? `<a href="${calendlyUrl}" target="${ctaTarget}" class="btn-full-gold">🎁 ${top.cta}</a>`
          : `<a href="${calendlyUrl}" target="${ctaTarget}" class="btn-full-gold">🎁 Réserver ma séance découverte gratuite</a>
             <a href="${ctaLink}" target="${ctaTarget}" class="btn-full-outline">${top.cta}</a>`
        }
        <a href="https://wa.me/33687207855?text=Bonjour%20Yoann%2C%20j%27ai%20fait%20le%20questionnaire%20et%20j%27aimerais%20en%20savoir%20plus." target="_blank" class="btn-full-outline">💬 Poser une question à Yoann</a>
      </div>

      <p class="restart-link" onclick="restartQuiz()">↺ Refaire le questionnaire</p>
    </div>
  `;

  document.getElementById('quizArea').classList.add('hidden');
  document.getElementById('stepCounter').textContent = 'Résultat';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('resultArea').classList.remove('hidden');
  document.getElementById('resultArea').innerHTML = html;
}

function restartQuiz() {
  currentQ = 0;
  answers = [];
  scores = { A:0, B:0, C:0, D:0, E:0, F:0, G:0 };
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  render();
}

// INIT
render();
</script>
</body>
</html>
